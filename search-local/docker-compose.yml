version: "3.9"
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=change_me_local
    command: >
      meilisearch --master-key change_me_local
                  --http-addr 0.0.0.0:7700
                  --db-path /meili_data
                  --http-payload-size-limit 104857600
    ports: ["7700:7700"]
    volumes:
      - meili_data:/meili_data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]

volumes:
  mongo_data:
  meili_data:
