name: Flutter Mobile CI

on:
  push:
    branches:
      - flutter-seeker-campus
  pull_request:
    branches:
      - flutter-seeker-campus
  workflow_dispatch:
    inputs:
      base_url:
        description: Backend API base URL for the Android build
        required: true
        default: https://jobzain.com
      show_diagnostics:
        description: Keep connection diagnostics visible in the tester build
        required: true
        type: boolean
        default: false
      local_campus_auth:
        description: Build a tester APK where campus accounts are saved on the phone instead of using backend auth
        required: true
        type: boolean
        default: false

jobs:
  verify-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install backend dependencies
        run: npm ci --ignore-scripts

      - name: Backend syntax check
        run: npm run check:syntax

      - name: Backend relative import check
        run: npm run check:imports

      - name: Backend app import smoke check
        run: npm run smoke:import

      - name: Verify backend mobile route contract
        run: npm run test:mobile-routes

      - name: Guard approved mobile palette
        run: |
          if git grep -n -E 'green|Green|10C26A|0xFF10C26A|0xff10c26a|Colors\.green|#10C26A|#10c26a' -- mobile/lib mobile/test mobile/docs mobile/README.md ':!mobile/docs/brand'; then
            echo "Old green mobile palette value found. Use the approved navy/cream/orange system."
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.3
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Static analysis
        working-directory: mobile
        run: flutter analyze

      - name: Run tests
        working-directory: mobile
        run: flutter test

      - name: Android debug build smoke check
        working-directory: mobile
        run: flutter build apk --debug --dart-define=HALA_DEFAULT_BASE_URL=https://jobzain.com

  verify-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.3
          channel: stable
          cache: true

      - name: Validate mobile PowerShell release scripts
        shell: pwsh
        run: |
          $files = @(
            'mobile\scripts\build-android.ps1',
            'mobile\scripts\mobile-release-preflight.ps1',
            'mobile\scripts\prepare-mobile-tester-drop.ps1',
            'mobile\scripts\package-mobile-tester-handoff.ps1',
            'mobile\scripts\assert-mobile-tester-handoff.ps1',
            'mobile\scripts\assert-mobile-playstore-release.ps1',
            'mobile\scripts\assert-mobile-device-qa-log.ps1',
            'mobile\scripts\assert-mobile-backend-reachability.ps1',
            'mobile\scripts\assert-mobile-live-api-routes.ps1',
            'mobile\scripts\assert-mobile-screen-inventory.ps1',
            'mobile\scripts\setup-android-signing.ps1',
            'mobile\scripts\setup-android-sdk.ps1'
          )

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Error "PowerShell parse failed: $file"
              $errors | Format-List *
              exit 1
            }
            Write-Host "OK $file"
          }

      - name: Assert mobile screen inventory
        shell: pwsh
        working-directory: mobile
        run: powershell.exe -ExecutionPolicy Bypass -File .\scripts\assert-mobile-screen-inventory.ps1

      - name: Resolve Android build inputs
        shell: pwsh
        run: |
          $baseUrl = '${{ github.event.inputs.base_url }}'
          if ([string]::IsNullOrWhiteSpace($baseUrl)) {
            $baseUrl = 'https://jobzain.com'
          }
          "HALA_CI_BASE_URL=$baseUrl" >> $env:GITHUB_ENV

          $showDiagnostics = '${{ github.event.inputs.show_diagnostics }}'
          if ($showDiagnostics -eq 'true') {
            "HALA_CI_SHOW_DIAGNOSTICS=true" >> $env:GITHUB_ENV
          } else {
            "HALA_CI_SHOW_DIAGNOSTICS=false" >> $env:GITHUB_ENV
          }

          $localCampusAuth = '${{ github.event.inputs.local_campus_auth }}'
          if ($localCampusAuth -eq 'true') {
            "HALA_CI_LOCAL_CAMPUS_AUTH=true" >> $env:GITHUB_ENV
            "HALA_CI_CAMPUS_AUTH_MODE=local-device" >> $env:GITHUB_ENV
          } else {
            "HALA_CI_LOCAL_CAMPUS_AUTH=false" >> $env:GITHUB_ENV
            "HALA_CI_CAMPUS_AUTH_MODE=remote-backend" >> $env:GITHUB_ENV
          }

      - name: Run Windows mobile tester drop
        shell: pwsh
        working-directory: mobile
        run: |
          $arguments = @(
            '-ExecutionPolicy',
            'Bypass',
            '-File',
            '.\scripts\prepare-mobile-tester-drop.ps1',
            '-BaseUrl',
            $env:HALA_CI_BASE_URL,
            '-BootstrapSdk'
          )

          if ($env:HALA_CI_SHOW_DIAGNOSTICS -eq 'true') {
            $arguments += '-ShowDiagnostics'
          }

          if ($env:HALA_CI_LOCAL_CAMPUS_AUTH -eq 'true') {
            $arguments += '-LocalCampusAuth'
          }

          powershell.exe @arguments

      - name: Write tester build summary
        if: always()
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Hala Job Mobile Tester Build"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Base URL: ``$env:HALA_CI_BASE_URL``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Campus auth mode: ``$env:HALA_CI_CAMPUS_AUTH_MODE``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Diagnostics: ``$env:HALA_CI_SHOW_DIAGNOSTICS``"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Use ``remote-backend`` for production campus accounts. Use ``local-device`` only for campus screen/device QA while the campus backend is not deployed."

          $routeReportPath = 'mobile\dist\android\mobile-live-api-routes-report.json'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Live API Route Deployment"

          if (Test-Path -LiteralPath $routeReportPath) {
            $routeReport = Get-Content -Raw -LiteralPath $routeReportPath | ConvertFrom-Json
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Status: ``$($routeReport.status)``"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Checked backend: ``$($routeReport.baseUrl)``"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Routes passed: ``$($routeReport.passed) / $($routeReport.total)``"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Routes failed: ``$($routeReport.failed)``"

            if ($routeReport.failed -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "> Production campus mode is not launch-ready until the failed live routes are deployed."
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Method | Path | Status |"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| --- | --- | --- |"
              foreach ($failedRoute in @($routeReport.failedResults | Select-Object -First 10)) {
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| $($failedRoute.method) | ``$($failedRoute.path)`` | ``$($failedRoute.statusCode)`` |"
              }
            }
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Status: ``not generated``"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- The tester ZIP may still exist, but no live API deployment report was found for this run."
          }

      - name: Upload latest tester APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: halajob-mobile-release-local-apk
          if-no-files-found: error
          retention-days: 14
          path: |
            mobile/dist/android/halajob-mobile-latest-release-local.apk
            mobile/dist/android/halajob-mobile-latest-release-local.apk.sha256
            mobile/dist/android/halajob-mobile-latest-release-local.apk.json
            mobile/dist/android/mobile-release-preflight-summary.json

      - name: Upload tester handoff ZIP
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: halajob-mobile-tester-handoff
          if-no-files-found: error
          retention-days: 14
          path: |
            mobile/dist/android/handoff/halajob-mobile-latest-release-local-tester-handoff-latest.zip
            mobile/dist/android/handoff/halajob-mobile-latest-release-local-tester-handoff-latest.zip.sha256
            mobile/dist/android/handoff/halajob-mobile-latest-release-local-tester-handoff-latest.zip.json
