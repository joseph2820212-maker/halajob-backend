name: Backend CI

on:
  push:
  pull_request:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (postinstall scripts disabled)
        run: npm ci --ignore-scripts

      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=high

      - run: npm run check:syntax
      - run: npm run check:imports
      - run: npm run check:permissions
      - run: npm run smoke:import
      - run: npm run test:unit
      - run: npm run test:route-validation
      - run: npm run test:response-codes
      - run: npm run test:model-integrity
      - run: npm run test:mixed-fields
      - run: npm run test:data-retention
      - run: npm run test:security-http
      - run: npm run check:secrets
      - run: npm run docs:api-artifacts

      # OpenAPI drift check. The generated OpenAPI/Postman/API-reference
      # artifacts are committed under docs/api/. If a route or middleware
      # changed but the docs weren't regenerated, this step fails so the
      # author has to run `npm run docs:api-artifacts` locally and commit.
      #
      # Uses `git status --porcelain docs/api/` (not `git diff`) so newly-
      # created untracked artifacts also trip the check — a bare `git diff`
      # would miss a brand-new file added by the generator.
      - name: Fail on OpenAPI drift
        run: |
          drift="$(git status --porcelain docs/api/)"
          if [ -n "$drift" ]; then
            echo "::error::OpenAPI / route inventory drift detected. Run 'npm run docs:api-artifacts' + 'npm run docs:route-report' and commit the results."
            echo "$drift"
            git --no-pager diff --stat docs/api/ | head -40
            exit 1
          fi

      - run: npm run test:integration:auth-context
        env:
          CONNECTION_URL: mongodb://localhost:27017/halajob_ci
